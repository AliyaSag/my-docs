site_name: TW_DOCS
site_description: Technical Writing Documentation
site_author: Your Name

theme:
  name: material
  font:
    text: Space Grotesk
    code: Fira Code
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: slate
      primary: deep purple
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables

nav:
  - Главная: index.md
  - Карьерный старт:
    - Войти в IT без технического образования: career/enter-it.md
    - Найти первую стажировку: career/find-internship.md
    - Собрать портфолио с нуля: career/build-portfolio.md
    - Пройти испытательный срок: career/probation.md
  - Мышление и рост:
    - Работа как терапия: mindset/work-as-therapy.md
    - Декомпозиция тревоги: mindset/anxiety-decomposition.md
    - Синдром самозванца на старте: mindset/impostor-syndrome.md
  - Инструменты:
    - Системы управления задачами: tools/task-management.md
    - Методы обратной связи: tools/feedback-methods.md
    - Форматы личной ретроспективы: tools/retrospective-formats.md
  - Справочник:
    - Глоссарий карьерного старта: reference/glossary.md
    - Список ресурсов: reference/resources.md